<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium View</title>

<style>
body {
  margin: 0;
  background: #000;
  font-family: system-ui, -apple-system, sans-serif;
  color: white;
  overflow: hidden;
}

/* Video */
#videoBox {
  display: none;
  width: 100%;
  height: 100vh;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 🔥 Modern Bottom Sheet Popup */
#cookiePopup {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  transition: 0.4s ease;
}

#cookiePopup.active {
  bottom: 20px;
}

.popupCard {
  width: 92%;
  max-width: 420px;
  background: rgba(25, 25, 25, 0.85);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 18px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.08);
}

/* Header line */
.popupTitle {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 6px;
}

.popupText {
  font-size: 13px;
  opacity: 0.75;
  line-height: 1.4;
  margin-bottom: 15px;
}

/* Buttons */
.btnRow {
  display: flex;
  gap: 10px;
}

button {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

.accept {
  background: linear-gradient(135deg, #00ff88, #00c853);
  color: black;
}

.decline {
  background: rgba(255,255,255,0.08);
  color: white;
}

button:active {
  transform: scale(0.96);
}
</style>
</head>

<body>

<div id="videoBox">
  <video id="myVideo" autoplay loop playsinline>
    <source src="0.mp4" type="video/mp4">
  </video>
</div>

<!-- Popup -->
<div id="cookiePopup" class="active">
  <div class="popupCard">
    <div class="popupTitle">🍪 Cookie Settings</div>
    <div class="popupText">
      We use cookies to improve your experience, personalize content and keep this service running smoothly.
    </div>

    <div class="btnRow">
      <button class="decline" onclick="declineCookies()">Decline</button>
      <button class="accept" onclick="acceptCookies()">Accept</button>
    </div>
  </div>
</div>

<script>
const video = document.getElementById("myVideo");
const popup = document.getElementById("cookiePopup");
const videoBox = document.getElementById("videoBox");

// Always show popup on load
window.onload = () => {
  popup.classList.add("active");
};

function acceptCookies() {
  popup.classList.remove("active");
  videoBox.style.display = "block";

  video.muted = false;
  video.play();
}

function declineCookies() {
  popup.classList.remove("active");
  videoBox.style.display = "block";

  video.muted = true;
  video.play();
}

// force play
video.addEventListener("pause", () => {
  video.play();
});
</script>

</body>
</html>
