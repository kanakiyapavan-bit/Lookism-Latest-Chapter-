<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium View</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000;
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
}

/* Smooth fade */
.fade {
  animation: fadeIn 0.8s ease forwards;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

/* Video container */
#videoBox {
  display: none;
  width: 100%;
  height: 100vh;
  position: relative;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Dark overlay for premium feel */
.overlay {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.6));
}

/* Cookie modal */
#cookiePopup {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 420px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 14px;
  padding: 20px;

  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  animation: pop 0.6s ease;
}

@keyframes pop {
  from {transform: translate(-50%, 20px); opacity: 0;}
  to {transform: translate(-50%, 0); opacity: 1;}
}

#cookiePopup p {
  margin-bottom: 15px;
  font-size: 14px;
  opacity: 0.9;
}

/* Buttons */
button {
  padding: 10px 18px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

.accept {
  background: linear-gradient(45deg, #00ff88, #00c3ff);
  color: black;
}

.decline {
  background: rgba(255,0,0,0.8);
  color: white;
}
</style>
</head>

<body>

<!-- VIDEO -->
<div id="videoBox">
  <video id="myVideo" autoplay loop playsinline>
    <source src="0.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>
</div>

<!-- COOKIE -->
<div id="cookiePopup">
  <p>We use cookies to improve your experience.</p>
  <button class="accept" onclick="acceptCookies()">Accept</button>
  <button class="decline" onclick="declineCookies()">Decline</button>
</div>

<script>
const video = document.getElementById("myVideo");
const popup = document.getElementById("cookiePopup");
const box = document.getElementById("videoBox");

function startVideo() {
  popup.style.display = "none";
  box.style.display = "block";
  box.classList.add("fade");

  video.muted = false;

  let playPromise = video.play();
  if (playPromise !== undefined) {
    playPromise.catch(() => {
      video.muted = true;
      video.play();
    });
  }
}

function acceptCookies() {
  localStorage.setItem("cookieAccepted", "true");
  startVideo();
}

function declineCookies() {
  popup.innerHTML = "<p>You declined cookies. Video cannot be loaded.</p>";
}

/* Auto load if already accepted */
if (localStorage.getItem("cookieAccepted")) {
  startVideo();
}

/* Force play (anti-pause loop light version) */
video.addEventListener("pause", () => {
  setTimeout(() => {
    video.play();
  }, 300);
});
</script>

</body>
</html>
