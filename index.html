<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium View</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0d0d0d;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  overflow: hidden;
}

/* VIDEO */
#videoBox {
  display: none;
  width: 100%;
  height: 100vh;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* POPUP OVERLAY */
#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* POPUP BOX */
#cookiePopup {
  width: 90%;
  max-width: 420px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  padding: 25px;
  text-align: center;
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
  animation: popupFade 0.5s ease;
}

@keyframes popupFade {
  from {
    transform: translateY(30px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

#cookiePopup h2 {
  font-size: 22px;
  margin-bottom: 10px;
}

#cookiePopup p {
  font-size: 14px;
  color: #ccc;
  margin-bottom: 20px;
  line-height: 1.5;
}

/* BUTTONS */
.btns {
  display: flex;
  gap: 10px;
  justify-content: center;
}

button {
  padding: 12px 18px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  transition: 0.3s ease;
}

/* ACCEPT BUTTON */
.accept {
  background: linear-gradient(135deg, #00ff88, #00ccff);
  color: black;
  font-weight: bold;
}

.accept:hover {
  transform: scale(1.05);
}

/* DECLINE BUTTON */
.decline {
  background: transparent;
  border: 1px solid #888;
  color: #ccc;
}

.decline:hover {
  background: rgba(255,255,255,0.1);
}

/* PRIVACY LINK */
.privacy {
  margin-top: 15px;
  font-size: 12px;
  color: #888;
  text-decoration: underline;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- VIDEO -->
<div id="videoBox">
  <video id="myVideo" autoplay loop playsinline>
    <source src="0.mp4" type="video/mp4">
  </video>
</div>

<!-- POPUP -->
<div id="overlay">
  <div id="cookiePopup">
    <h2>🍪 Cookies & Privacy</h2>
    <p>
      We use cookies to improve your experience and provide better content.
      By continuing, you agree to our usage of cookies.
    </p>

    <div class="btns">
      <button class="accept" onclick="acceptCookies()">Accept</button>
      <button class="decline" onclick="declineCookies()">Decline</button>
    </div>

    <div class="privacy">Privacy Policy</div>
  </div>
</div>

<script>
const video = document.getElementById("myVideo");

function acceptCookies() {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("videoBox").style.display = "block";

  video.muted = false;
  video.play();
}

function declineCookies() {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("videoBox").style.display = "block";

  video.muted = true;
  video.play();
}

// Force play
video.addEventListener("pause", () => {
  video.play();
});
</script>

</body>
</html>
